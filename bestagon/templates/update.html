{% extends "base.html" %}

{% block title %}Bestagon Update{% endblock %}

{% block content %}
<div class="update-card">
  <span class="update-badge" id="updateBadge">Checking…</span>
  <h2 class="update-title" id="updateTitle">Checking for updates</h2>
  <p class="update-sub" id="updateSub">This only takes a moment.</p>
  <button class="btn btn-primary" id="updateButton" disabled>Install update</button>
  <div class="ring is-hidden" id="spinner"><div></div><div></div><div></div><div></div></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/update.js"></script>
{% endblock %}
